<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aria Voice - Light</title>
    <style>
        body {
            background-color: #f5f7fa;
            color: #333;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #4a90e2; }

        #status {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
            padding: 4px 12px;
            background: #eee;
            border-radius: 20px;
            display: inline-block;
        }

        #transcript {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 1rem;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1.5rem;
            background: #fafafa;
        }

        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background: #4a90e2; color: white; }
        .agent { align-self: flex-start; background: #e9e9eb; color: #333; }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        #btn-connect { background: #4a90e2; color: white; }
        #btn-connect:hover { background: #357abd; }
        #btn-disconnect { background: #ff4d4d; color: white; margin-top: 10px; display: none; }

        #audio-container { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
</head>
<body>

<div class="container">
    <h1>Aria Voice Assistant</h1>
    <div id="status">Ready</div>
    
    <div id="transcript">
        <div style="color: #999; font-style: italic; text-align: center;">Transcripts will appear here...</div>
    </div>
    
    <button id="btn-connect">Start Conversation</button>
    <button id="btn-disconnect">End Session</button>
</div>

<div id="audio-container"></div>

<script>
    const API_URL = 'http://localhost:8080';
    let currentRoom = null;
    let currentSessionId = null;

    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const audioContainer = document.getElementById('audio-container');

    function addTranscript(text, role) {
        if (transcriptEl.querySelector('div[style*="italic"]')) {
            transcriptEl.innerHTML = '';
        }
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = (role === 'user' ? 'You: ' : 'Aria: ') + text;
        transcriptEl.appendChild(div);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
    }

    async function connect() {
        try {
            statusEl.innerText = 'Connecting...';
            btnConnect.disabled = true;

            const res = await fetch(`${API_URL}/session/join`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_identity: 'user-' + Math.random().toString(36).substr(2, 5) })
            });

            const data = await res.json();
            currentSessionId = data.session_id;

            const room = new LivekitClient.Room();
            currentRoom = room;

            room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                if (track.kind === 'audio') {
                    const el = track.attach();
                    audioContainer.appendChild(el);
                }
            });

            room.on(LivekitClient.RoomEvent.DataReceived, (payload) => {
                const data = JSON.parse(new TextDecoder().decode(payload));
                if (data.type === 'transcription') {
                    addTranscript(data.text, data.participant);
                }
            });

            await room.connect(data.livekit_url, data.token);
            await room.localParticipant.setMicrophoneEnabled(true);

            statusEl.innerText = 'Connected';
            btnConnect.style.display = 'none';
            btnDisconnect.style.display = 'block';

        } catch (err) {
            console.error(err);
            statusEl.innerText = 'Error: ' + err.message;
            btnConnect.disabled = false;
        }
    }

    async function disconnect() {
        if (currentRoom) await currentRoom.disconnect();
        if (currentSessionId) fetch(`${API_URL}/session/${currentSessionId}`, { method: 'DELETE' });
        location.reload();
    }

    btnConnect.addEventListener('click', connect);
    btnDisconnect.addEventListener('click', disconnect);
</script>
</body>
</html>
