services:
  livekit:
    image: livekit/livekit-server:v1.11.0
    command: --config /etc/livekit.yaml --dev
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"                 # HTTP/WS signaling
      - "7881:7881"                 # RTC TCP fallback
      - "7882-7982:7882-7982/udp"   # UDP media — matches port_range
    networks:
      - poc_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - poc_network

  session-router:
    build:
      context: .
      dockerfile: services/session-router/Dockerfile
    volumes:
      - ./services/session-router:/app/services/session-router
      - ./shared:/app/shared
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - poc_network

  event-bridge:
    build:
      context: .
      dockerfile: services/event-bridge/Dockerfile
    volumes:
      - ./services/event-bridge:/app/services/event-bridge
      - ./shared:/app/shared
    env_file: .env
    ports:
      - "8090:8090"
    depends_on:
      - redis
    networks:
      - poc_network

  agent-mode1:
    build:
      context: .
      dockerfile: services/agent-mode1/Dockerfile
    volumes:
      - ./services/agent-mode1:/app/services/agent-mode1
      - ./shared:/app/shared
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8081:8080"
    depends_on:
      - livekit
      - redis
    networks:
      - poc_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-mode2:
    build:
      context: .
      dockerfile: services/agent-mode2/Dockerfile
    volumes:
      - ./services/agent-mode2:/app/services/agent-mode2
      - ./shared:/app/shared
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8082:8080"
    depends_on:
      - livekit
      - redis
    networks:
      - poc_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-mode3:
    build:
      context: .
      dockerfile: services/agent-mode3/Dockerfile
    volumes:
      - ./services/agent-mode3:/app/services/agent-mode3
      - ./shared:/app/shared
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8083:8080"
    depends_on:
      - livekit
      - redis
    networks:
      - poc_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: nginx:alpine
    volumes:
      - ./services/frontend:/usr/share/nginx/html
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    networks:
      - poc_network

networks:
  poc_network:
    driver: bridge
